<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">StratoCast architecture</title>
<desc id="diagram-desc">A client on the user's machine authenticates to a relay server co-located with DCS-SRS. The relay transcodes audio and speaks the SRS protocol to broadcast to in-game pilots.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .zone-boundary { stroke: #888; stroke-dasharray: 4 4; fill: none; stroke-width: 0.75; opacity: 0.8; }
  .zone-label { fill: #222; }
  .zone-sub { fill: #666; }
  .section-title { fill: #222; }
  .teal-box { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.75; }
  .teal-title { fill: #085041; }
  .teal-sub { fill: #0F6E56; }
  .blue-box { fill: #E6F1FB; stroke: #378ADD; stroke-width: 0.75; }
  .blue-title { fill: #0C447C; }
  .blue-sub { fill: #185FA5; }
  .arrow { stroke: #444; fill: none; stroke-width: 1.5; stroke-linecap: round; }
  .arrow-label { fill: #444; }
</style>
<defs>
  <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="680" height="480" fill="#ffffff"/>

<rect class="zone-boundary" x="20" y="40" width="200" height="400" rx="16"/>
<text class="th zone-label" x="120" y="62" text-anchor="middle">User machine</text>
<text class="ts zone-sub" x="120" y="80" text-anchor="middle">User's PC</text>

<rect class="teal-box" x="35" y="100" width="170" height="32" rx="6"/>
<text class="th teal-title" x="120" y="120" text-anchor="middle">Local audio files</text>

<rect class="teal-box" x="35" y="140" width="170" height="32" rx="6"/>
<text class="th teal-title" x="120" y="160" text-anchor="middle">YouTube Music</text>

<rect class="teal-box" x="35" y="180" width="170" height="32" rx="6"/>
<text class="th teal-title" x="120" y="200" text-anchor="middle">Spotify Web API</text>

<text class="th section-title" x="120" y="236" text-anchor="middle">Client app</text>

<rect class="blue-box" x="35" y="246" width="170" height="52" rx="6"/>
<text class="th blue-title" x="120" y="268" text-anchor="middle">Source manager</text>
<text class="ts blue-sub" x="120" y="286" text-anchor="middle">Playlists, metadata</text>

<rect class="blue-box" x="35" y="306" width="170" height="52" rx="6"/>
<text class="th blue-title" x="120" y="328" text-anchor="middle">Auth client</text>
<text class="ts blue-sub" x="120" y="346" text-anchor="middle">Tokens, TLS</text>

<rect class="blue-box" x="35" y="366" width="170" height="52" rx="6"/>
<text class="th blue-title" x="120" y="388" text-anchor="middle">Opus encoder</text>
<text class="ts blue-sub" x="120" y="406" text-anchor="middle">Decode to 16 kHz Opus</text>

<rect class="zone-boundary" x="235" y="40" width="290" height="400" rx="16"/>
<text class="th zone-label" x="380" y="62" text-anchor="middle">Server host</text>
<text class="ts zone-sub" x="380" y="80" text-anchor="middle">Co-located with SRS</text>

<text class="th section-title" x="380" y="108" text-anchor="middle">Relay server</text>

<rect class="blue-box" x="250" y="118" width="120" height="52" rx="6"/>
<text class="th blue-title" x="310" y="140" text-anchor="middle">Auth &amp; tokens</text>
<text class="ts blue-sub" x="310" y="158" text-anchor="middle">Users, scopes</text>

<rect class="blue-box" x="380" y="118" width="120" height="52" rx="6"/>
<text class="th blue-title" x="440" y="140" text-anchor="middle">Rate &amp; quotas</text>
<text class="ts blue-sub" x="440" y="158" text-anchor="middle">Stream caps</text>

<rect class="blue-box" x="250" y="180" width="120" height="52" rx="6"/>
<text class="th blue-title" x="310" y="202" text-anchor="middle">Audio pipeline</text>
<text class="ts blue-sub" x="310" y="220" text-anchor="middle">Transcode, mix</text>

<rect class="blue-box" x="380" y="180" width="120" height="52" rx="6"/>
<text class="th blue-title" x="440" y="202" text-anchor="middle">SRS adapter</text>
<text class="ts blue-sub" x="440" y="220" text-anchor="middle">Speaks SRS protocol</text>

<rect class="blue-box" x="315" y="242" width="120" height="52" rx="6"/>
<text class="th blue-title" x="375" y="264" text-anchor="middle">Admin &amp; logs</text>
<text class="ts blue-sub" x="375" y="282" text-anchor="middle">Kill switch, audit</text>

<rect class="teal-box" x="240" y="315" width="280" height="60" rx="6"/>
<text class="th teal-title" x="380" y="340" text-anchor="middle">DCS-SRS server</text>
<text class="ts teal-sub" x="380" y="358" text-anchor="middle">Existing install, unmodified</text>

<rect class="zone-boundary" x="540" y="40" width="120" height="400" rx="16"/>
<text class="th zone-label" x="600" y="62" text-anchor="middle">DCS game</text>
<text class="ts zone-sub" x="600" y="80" text-anchor="middle">In-mission pilots</text>

<rect class="teal-box" x="555" y="120" width="90" height="46" rx="6"/>
<text class="th teal-title" x="600" y="140" text-anchor="middle">Pilot 1</text>
<text class="ts teal-sub" x="600" y="158" text-anchor="middle">F-16C</text>

<rect class="teal-box" x="555" y="175" width="90" height="46" rx="6"/>
<text class="th teal-title" x="600" y="195" text-anchor="middle">Pilot 2</text>
<text class="ts teal-sub" x="600" y="213" text-anchor="middle">A-10C</text>

<rect class="teal-box" x="555" y="230" width="90" height="46" rx="6"/>
<text class="th teal-title" x="600" y="250" text-anchor="middle">Pilot 3</text>
<text class="ts teal-sub" x="600" y="268" text-anchor="middle">F/A-18C</text>

<text class="ts zone-sub" x="600" y="300" text-anchor="middle">… more pilots</text>

<path class="arrow" d="M 205 322 L 227 322 L 227 144 L 245 144" marker-end="url(#arrowhead)"/>
<text class="ts arrow-label" x="230" y="96" text-anchor="start">TLS + auth</text>

<path class="arrow" d="M 440 232 L 440 312" marker-end="url(#arrowhead)"/>
<text class="ts arrow-label" x="448" y="302" text-anchor="start">loopback</text>

<path class="arrow" d="M 520 345 L 532 345 L 532 198 L 551 198" marker-end="url(#arrowhead)"/>
<text class="ts arrow-label" x="528" y="337" text-anchor="middle">UDP</text>
</svg>
